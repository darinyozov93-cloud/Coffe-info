name: Softs Daily

on:
  schedule:
    - cron: "30 5 * * *"   # 05:30 UTC = 08:30 БГ лятно; с типичното закъснение каца ~9:00
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install yfinance

      - name: Run softs daily
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python softs_daily.py
